<!DOCTYPE html><html lang="ko"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Song of the Wasteland</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rye&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#1a0f00;display:flex;justify-content:center;font-family:'Pretendard',sans-serif;}
#game{width:380px;height:700px;position:relative;overflow:hidden;user-select:none;-webkit-user-select:none;}
#bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center top;z-index:0;}
#overlay{position:absolute;inset:0;z-index:1;background:linear-gradient(to bottom,rgba(0,0,0,0.12) 0%,rgba(0,0,0,0) 22%,rgba(6,3,0,0.42) 68%,rgba(5,2,0,0.9) 100%);}
#confetti-canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:15;opacity:0;}
#content{position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 0 12px;}

/* Title */
#title-area{display:flex;flex-direction:column;align-items:center;margin-bottom:20px;width:320px;}
.deco-rule{display:flex;align-items:center;gap:8px;width:100%;margin-bottom:6px;}
.deco-rule .ln{flex:1;height:1px;background:linear-gradient(to right,transparent,rgba(245,215,142,0.7),transparent);}
.deco-rule .dm{width:7px;height:7px;background:#F5D78E;transform:rotate(45deg);flex-shrink:0;}
.deco-rule .dt{width:4px;height:4px;border-radius:50%;background:rgba(245,215,142,0.6);flex-shrink:0;}
#title-area h1{font-family:'Rye',serif;font-size:27px;color:#F5D78E;letter-spacing:1px;line-height:1.45;text-align:center;text-shadow:0 2px 12px rgba(0,0,0,0.9);padding:0 8px;}
.deco-bot{display:flex;align-items:center;gap:6px;width:100%;margin-top:7px;}
.deco-bot .ln{flex:1;height:1px;background:linear-gradient(to right,transparent,rgba(245,215,142,0.5),transparent);}
.deco-bot .cr{position:relative;width:12px;height:12px;flex-shrink:0;}
.deco-bot .cr::before,.deco-bot .cr::after{content:'';position:absolute;background:rgba(245,215,142,0.6);border-radius:1px;}
.deco-bot .cr::before{width:1.5px;height:12px;left:5px;top:0;}
.deco-bot .cr::after{width:12px;height:1.5px;left:0;top:5px;}

/* ── Closet wrap ── */
#closet-wrap{
  position:relative;
  width:220px;
  height:362px;
  cursor:pointer;flex-shrink:0;
  overflow:hidden;
}

/* Closet background image — full closet art fills container */
#closet-bg-img{
  position:absolute;
  top:0;left:0;width:100%;
  height:100%;
  object-fit:fill;
  z-index:1;
  pointer-events:none;
}

/* Character — inside the door opening
   Opening is roughly: x=8 to x=256, y=34 to y=403 (within 264x435 closet)
   But closet-wrap height is 370 so we shift slightly
*/
#char-img{
  position:absolute;
  top:23px;left:7px;
  width:206px;
  height:316px;
  object-fit:cover;
  object-position:center top;
  opacity:0;
  transition:opacity 0.35s ease;
  pointer-events:none;
  z-index:2;
}

/* ── 3D Door wrappers ──
   Left door: starts at x=5, width=127px, top=34px, height=336px
   Right door: starts at x=132, width=127px, top=34px, height=336px
   perspective on outer wrapper, rotateY on inner
*/
.door-persp{
  position:absolute;
  top:23px;height:316px;
  pointer-events:none;z-index:10;
}
#dp-l{
  left:5px;width:105px;
  perspective:600px;
  perspective-origin:0% 50%;
}
#dp-r{
  right:5px;width:105px;
  perspective:600px;
  perspective-origin:100% 50%;
}
.door-pivot{
  width:100%;height:100%;
  transform-style:preserve-3d;
  transition:transform 0.07s ease-out;
  position:relative;
}
#di-l{transform-origin:left center;}
#di-r{transform-origin:right center;}

/* Door face image */
.door-face{
  position:absolute;
  top:0;left:0;width:100%;height:100%;
  display:block;
  object-fit:fill;
  backface-visibility:visible;
}

/* Door thickness strip — visible when door opens */
.door-thick-l{
  position:absolute;
  top:0;right:-10px;
  width:10px;height:100%;
  background:linear-gradient(to right,#2A1608,#1A0C04);
  transform-origin:left center;
  transform:rotateY(90deg);
  backface-visibility:visible;
}
.door-thick-r{
  position:absolute;
  top:0;left:-10px;
  width:10px;height:100%;
  background:linear-gradient(to left,#2A1608,#1A0C04);
  transform-origin:right center;
  transform:rotateY(-90deg);
  backface-visibility:visible;
}

/* Tap effects */
.ripple{position:absolute;border-radius:50%;background:rgba(200,150,60,0.25);transform:scale(0);animation:ripOut 0.5s ease-out forwards;pointer-events:none;z-index:22;}
@keyframes ripOut{to{transform:scale(6);opacity:0;}}
.hat-burst{position:absolute;font-size:20px;pointer-events:none;animation:hatUp 0.65s ease-out forwards;z-index:28;line-height:1;}
@keyframes hatUp{0%{opacity:1;transform:translate(-50%,-50%) scale(0.5) rotate(-15deg);}55%{opacity:1;transform:translate(-50%,-140%) scale(1.15) rotate(10deg);}100%{opacity:0;transform:translate(-50%,-210%) scale(0.8) rotate(20deg);}}
.dust{position:absolute;border-radius:50%;background:rgba(210,180,100,0.6);pointer-events:none;z-index:26;animation:dustFloat 0.9s ease-out forwards;}
@keyframes dustFloat{0%{opacity:0.7;transform:translate(0,0) scale(1);}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0.15);}}
@keyframes shake{0%{transform:translateX(0);}20%{transform:translateX(-4px);}50%{transform:translateX(5px);}80%{transform:translateX(-2px);}100%{transform:translateX(0);}}
.shaking{animation:shake 0.13s ease;}

/* Progress */
#bar-wrap{width:250px;margin-top:20px;text-align:center;}
#bar-track{width:100%;height:12px;background:rgba(10,5,0,0.65);border-radius:7px;border:1.5px solid rgba(180,130,50,0.4);overflow:hidden;}
#bar-fill{height:100%;width:0%;background:linear-gradient(90deg,#8A2218,#C83020);border-radius:5px;transition:width 0.1s ease;position:relative;}
#bar-fill::after{content:'';position:absolute;top:2px;left:4px;right:4px;height:2.5px;background:rgba(255,255,255,0.13);border-radius:3px;}
#bar-msg{margin-top:10px;font-family:'Pretendard',sans-serif;font-size:13px;font-weight:800;color:#ECC870;letter-spacing:0.8px;height:17px;}
#reset-warn{font-family:'Pretendard',sans-serif;font-size:10px;color:#FF6B6B;margin-top:2px;height:13px;opacity:0;transition:opacity 0.3s;}

/* Bottom sheet */
#bottom-sheet{position:absolute;bottom:0;left:0;right:0;background:#fff;border-top:3px solid #F5D78E;border-radius:24px 24px 0 0;padding:14px 24px 32px;display:flex;flex-direction:column;align-items:center;gap:10px;transform:translateY(100%);transition:transform 0.48s cubic-bezier(0.34,1.15,0.64,1);z-index:30;box-shadow:0 -8px 32px rgba(0,0,0,0.35);}
#bottom-sheet.open{transform:translateY(0);}
#sheet-handle{width:36px;height:4px;background:#E0D0B0;border-radius:2px;margin-bottom:2px;}
#came-out-row{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;}
#came-out-text{font-family:'Pretendard',sans-serif;font-weight:900;font-size:20px;color:#F5C000;letter-spacing:-0.3px;white-space:nowrap;}
.fw-side{width:34px;height:34px;flex-shrink:0;}
.fw-side canvas{width:100%;height:100%;display:block;}
#sheet-series{font-family:'Pretendard',sans-serif;font-size:13px;font-weight:700;color:#1a1a1a;text-align:center;margin-top:-2px;}
#sheet-divider{width:100%;height:1px;background:#eee;}
#cta-btn{font-family:'Pretendard',sans-serif;font-size:16px;font-weight:800;color:#1C0A02;background:#F5D78E;border:none;border-radius:14px;padding:17px 0;cursor:pointer;width:100%;text-align:center;transition:transform 0.12s,background 0.12s;}
#cta-btn:active{transform:scale(0.97);background:#E8C055;}
</style></head><body>

function setDoors(pct){
  var d=(pct/100)*82;
  diL.style.transform='rotateY('+(-d)+'deg)';
  diR.style.transform='rotateY('+d+'deg)';
}

function handleTap(e){
  if(done)return;
  e.preventDefault();
  var src=e.changedTouches?e.changedTouches[0]:e;
  var rect=closetWrap.getBoundingClientRect();
  var x=src.clientX-rect.left,y=src.clientY-rect.top;
  taps=Math.min(taps+1,TOTAL);
  var pct=(taps/TOTAL)*100;
  barFill.style.width=pct+'%';
  barMsg.textContent=msgs[Math.min(Math.floor(pct/27),3)];
  setDoors(pct);
  if(pct>40) charImg.style.opacity=Math.min((pct-40)/60,1).toFixed(2);
  spawnHat(x,y);spawnRipple(x,y);spawnDust(x,y);doShake();
  clearTimeout(resetTimer);clearTimeout(warnTimer);resetWarn.style.opacity='0';
  if(taps>=TOTAL){
    done=true;setDoors(100);charImg.style.opacity='1';barMsg.textContent='';
    barFill.style.background='linear-gradient(90deg,#1B6B22,#3CB043)';
    setTimeout(showCelebration,300);return;
  }
  warnTimer=setTimeout(function(){resetWarn.style.opacity='1';},1500);
  resetTimer=setTimeout(function(){
    taps=0;barFill.style.width='0%';barMsg.textContent='Tap the closet!';
    setDoors(0);charImg.style.opacity='0';resetWarn.style.opacity='0';
  },RESET_MS);
}

function spawnDust(x,y){
  for(var i=0;i<6;i++){
    var el=document.createElement('div');el.className='dust';
    var s=Math.random()*5+3;
    el.style.cssText='position:absolute;width:'+s+'px;height:'+s+'px;left:'+(x+(Math.random()*16-8))+'px;top:'+y+'px;--dx:'+(Math.random()*40-20)+'px;--dy:'+-(Math.random()*30+10)+'px;animation-duration:'+(0.7+Math.random()*0.4)+'s;';
    closetWrap.appendChild(el);
    setTimeout(function(el){el.remove();},1200,el);
  }
}

function showCelebration(){
  bottomSheet.classList.add('open');
  bigCanvas.width=380;bigCanvas.height=700;bigCanvas.style.opacity='1';
  confetti.length=0;
  for(var i=0;i<100;i++) confetti.push({x:Math.random()*380,y:Math.random()*-140,r:Math.random()*5+2.5,d:Math.random()*3+1.5,color:COLORS[Math.floor(Math.random()*COLORS.length)],tilt:Math.floor(Math.random()*10)-10,tiltAngleInc:(Math.random()*0.1)+0.04,tiltAngle:0,rotation:Math.random()*360,rotSpeed:(Math.random()-0.5)*10,shape:Math.random()<0.5?'rect':'circle'});
  startFW('fw-left');startFW('fw-right');
  var frame=0;
  (function loop(){
    if(frame>280){bigCtx.clearRect(0,0,380,700);bigCanvas.style.opacity='0';return;}
    bigCtx.clearRect(0,0,380,700);
    confetti.forEach(function(c){bigCtx.save();bigCtx.translate(c.x,c.y);bigCtx.rotate(c.rotation*Math.PI/180);bigCtx.fillStyle=c.color;if(c.shape==='circle'){bigCtx.beginPath();bigCtx.arc(0,0,c.r,0,Math.PI*2);bigCtx.fill();}else{bigCtx.fillRect(-c.r,-c.r/2,c.r*2,c.r);}bigCtx.restore();c.y+=c.d;c.x+=Math.sin(frame*0.02+c.tilt)*1.5;c.rotation+=c.rotSpeed;if(c.y>700){c.y=-10;c.x=Math.random()*380;}});
    frame++;requestAnimationFrame(loop);
  })();
}
function startFW(id){
  var cv=document.getElementById(id);if(!cv)return;
  cv.width=48;cv.height=48;var cx=cv.getContext('2d');var pts=[];
  function burst(){pts=[];for(var i=0;i<16;i++)pts.push({angle:((Math.PI*2)/16)*i+(Math.random()*0.3),speed:Math.random()*2.8+1.5,r:Math.random()*2.5+1.2,color:COLORS[Math.floor(Math.random()*COLORS.length)],dist:0,maxDist:Math.random()*16+10,alpha:1});}
  burst();var rep=0;
  (function fw(){if(rep>5)return;cx.clearRect(0,0,48,48);var d2=true;pts.forEach(function(p){if(p.dist<p.maxDist)d2=false;p.dist+=p.speed;p.alpha=Math.max(0,1-p.dist/p.maxDist);cx.globalAlpha=p.alpha;cx.fillStyle=p.color;cx.beginPath();cx.arc(24+Math.cos(p.angle)*p.dist,24+Math.sin(p.angle)*p.dist,p.r,0,Math.PI*2);cx.fill();});cx.globalAlpha=1;if(d2){rep++;setTimeout(function(){burst();requestAnimationFrame(fw);},120);}else requestAnimationFrame(fw);})();
}
function spawnHat(x,y){var el=document.createElement('div');el.className='hat-burst';el.textContent='\uD83E\uDD20';el.style.cssText='position:absolute;left:'+x+'px;top:'+y+'px;';closetWrap.appendChild(el);setTimeout(function(){el.remove();},680);}
function spawnRipple(x,y){var el=document.createElement('div');el.className='ripple';var s=28;el.style.cssText='position:absolute;width:'+s+'px;height:'+s+'px;left:'+(x-s/2)+'px;top:'+(y-s/2)+'px;';closetWrap.appendChild(el);setTimeout(function(){el.remove();},520);}
function doShake(){closetWrap.classList.remove('shaking');void closetWrap.offsetWidth;closetWrap.classList.add('shaking');setTimeout(function(){closetWrap.classList.remove('shaking');},140);}
</script></body></html>
